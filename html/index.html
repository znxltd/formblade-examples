<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Form — FormBlade HTML Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 14px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Contact Us</h1>

  <form action="https://formblade.com/f/contact" method="POST">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="4" placeholder="How can we help?" required></textarea>

    <!-- Honeypot (spam protection — keep hidden) -->
    <input type="text" name="_fb_hp" style="display:none" tabindex="-1" autocomplete="off">

    <button type="submit">Send</button>
  </form>
</body>
</html>
