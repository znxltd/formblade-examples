<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Form — FormBlade AJAX Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    .success { color: #16a34a; font-weight: 600; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Contact Us</h1>

  <form id="contact-form">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" rows="4" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>

  <div id="result"></div>

  <script>
    var FORM_URL = 'https://formblade.com/f/contact';

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = this.querySelector('button');
      var result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      var data = {};
      new FormData(this).forEach(function(v, k) { data[k] = v; });

      fetch(FORM_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify(data)
      })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        result.innerHTML = '<p class="success">Thank you! Your message has been sent.</p>';
        e.target.reset();
      })
      .catch(function() {
        result.innerHTML = '<p class="error">Something went wrong. Please try again.</p>';
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Send';
      });
    });
  </script>
</body>
</html>
