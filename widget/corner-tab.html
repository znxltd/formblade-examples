<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Widget with Notification Dot — FormBlade Example</title>
</head>
<body>
  <h1>Your Website</h1>
  <p>The button has a red notification dot and hides after the visitor submits.</p>

  <!-- FormBlade Widget with dot + hide after submit -->
  <script src="https://formblade.com/widget.js"
    data-form="feedback"
    data-label="Feedback"
    data-color="#10b981"
    data-dot="true"
    data-hide-after-submit="true"></script>
</body>
</html>
