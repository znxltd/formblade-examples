<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Widget with Emoji — FormBlade Example</title>
</head>
<body>
  <h1>Your Website</h1>
  <p>The button has a waving hand emoji and auto-opens after 5 seconds.</p>

  <!-- FormBlade Widget with emoji + time trigger -->
  <script src="https://formblade.com/widget.js"
    data-form="contact"
    data-label="Say hello"
    data-emoji="👋"
    data-emoji-animation="wave"
    data-open="time"
    data-open-value="5000"></script>
</body>
</html>
