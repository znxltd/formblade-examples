<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Widget — FormBlade Example</title>
</head>
<body>
  <h1>Your Website</h1>
  <p>Click the "Contact us" button in the bottom-right corner to open the form.</p>

  <!-- FormBlade Widget — paste before </body> -->

    data-form="contact"
    data-label="Contact us"
    data-color="#6366f1"></script>
</body>
</html>
