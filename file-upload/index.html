<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>File Upload Form — FormBlade Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Submit a file</h1>

  <!-- enctype="multipart/form-data" is required for file uploads -->
  <form action="https://formblade.com/f/contact" method="POST" enctype="multipart/form-data">
    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" rows="3" placeholder="Description"></textarea>

    <label>Attach a file</label>
    <input type="file" name="attachment">

    <!-- Honeypot -->
    <input type="text" name="_fb_hp" style="display:none" tabindex="-1" autocomplete="off">

    <button type="submit">Upload & Send</button>
  </form>
</body>
</html>
